<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我が家のレシピ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#fdf6ec;font-family:Noto Sans JP,sans-serif;color:#5c3d1e;margin:0">

<div id="authScreen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="background:white;border-radius:16px;padding:32px 24px;width:100%;max-width:400px;box-shadow:0 4px 20px rgba(92,61,30,0.12)">
    <div style="font-family:Noto Serif JP,serif;font-size:24px;color:#5c3d1e;text-align:center;margin-bottom:4px">🍲 我が家のレシピ</div>
    <div style="font-size:12px;color:#9b7b5a;text-align:center;margin-bottom:24px">wagaya no recipe</div>
    <div style="display:flex;margin-bottom:24px;border-bottom:2px solid #f5e6c8">
      <div id="tabLogin" onclick="showTab('login')" style="flex:1;padding:10px;text-align:center;font-size:13px;cursor:pointer;border-bottom:2px solid #c0622a;margin-bottom:-2px;color:#c0622a;font-weight:500">ログイン</div>
      <div id="tabSignup" onclick="showTab('signup')" style="flex:1;padding:10px;text-align:center;font-size:13px;cursor:pointer;color:#9b7b5a">新規登録</div>
    </div>
    <div id="loginForm">
      <div style="margin-bottom:14px"><label style="font-size:12px;color:#9b7b5a;margin-bottom:6px;display:block">メールアドレス</label><input id="loginEmail" type="email" placeholder="example@mail.com" style="width:100%;padding:12px 14px;border:1.5px solid #f5e6c8;border-radius:10px;font-size:14px;color:#5c3d1e;outline:none;box-sizing:border-box"></div>
      <div style="margin-bottom:14px"><label style="font-size:12px;color:#9b7b5a;margin-bottom:6px;display:block">パスワード</label><input id="loginPassword" type="password" placeholder="••••••••" style="width:100%;padding:12px 14px;border:1.5px solid #f5e6c8;border-radius:10px;font-size:14px;color:#5c3d1e;outline:none;box-sizing:border-box"></div>
      <button id="loginBtn" style="width:100%;padding:13px;background:#c0622a;border:none;border-radius:12px;color:white;font-size:14px;cursor:pointer;margin-top:8px">ログイン</button>
    </div>
    <div id="signupForm" style="display:none">
      <div style="margin-bottom:14px"><label style="font-size:12px;color:#9b7b5a;margin-bottom:6px;display:block">メールアドレス</label><input id="signupEmail" type="email" placeholder="example@mail.com" style="width:100%;padding:12px 14px;border:1.5px solid #f5e6c8;border-radius:10px;font-size:14px;color:#5c3d1e;outline:none;box-sizing:border-box"></div>
      <div style="margin-bottom:14px"><label style="font-size:12px;color:#9b7b5a;margin-bottom:6px;display:block">パスワード（6文字以上）</label><input id="signupPassword" type="password" placeholder="••••••••" style="width:100%;padding:12px 14px;border:1.5px solid #f5e6c8;border-radius:10px;font-size:14px;color:#5c3d1e;outline:none;box-sizing:border-box"></div>
      <button id="signupBtn" style="width:100%;padding:13px;background:#c0622a;border:none;border-radius:12px;color:white;font-size:14px;cursor:pointer;margin-top:8px">登録する</button>
    </div>
    <div id="authMsg" style="font-size:12px;text-align:center;margin-top:10px"></div>
  </div>
</div>

<div id="appScreen" style="display:none">
  <div style="background:#5c3d1e;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100">
    <h1 style="font-family:Noto Serif JP,serif;font-size:20px;color:#f5e6c8;margin:0">我が家のレシピ<span style="font-size:11px;display:block;color:#9b7b5a;font-family:Noto Sans JP,sans-serif;font-weight:300">wagaya no recipe</span></h1>
    <div style="display:flex;gap:16px">
      <button id="importBtn" style="background:none;border:none;color:#f5e6c8;font-size:20px;cursor:pointer">📥</button>
      <button id="logoutBtn" style="background:none;border:none;color:#f5e6c8;font-size:20px;cursor:pointer">👤</button>
    </div>
  </div>
  <div style="background:#fffdf8;display:flex;border-bottom:2px solid #f5e6c8">
    <div id="tabMy" onclick="switchTab('my')" style="flex:1;padding:12px 8px;text-align:center;font-size:12px;cursor:pointer;border-bottom:2px solid #c0622a;margin-bottom:-2px;color:#c0622a;font-weight:500"><span style="font-size:16px;display:block;margin-bottom:2px">📖</span>マイレシピ</div>
    <div id="tabPublic" onclick="switchTab('public')" style="flex:1;padding:12px 8px;text-align:center;font-size:12px;cursor:pointer;color:#9b7b5a"><span style="font-size:16px;display:block;margin-bottom:2px">🌐</span>レシピ広場</div>
  </div>
  <div style="padding:16px;max-width:480px;margin:0 auto">
    <div style="background:white;border:1.5px solid #f5e6c8;border-radius:24px;padding:10px 16px;display:flex;align-items:center;gap:8px;margin-bottom:20px">
      <span>🔍</span><input id="searchInput" type="text" placeholder="レシピを検索..." oninput="filterRecipes()" style="border:none;outline:none;flex:1;font-size:14px;color:#5c3d1e;background:transparent">
    </div>
    <div id="tabMyContent">
      <div style="font-family:Noto Serif JP,serif;font-size:15px;color:#5c3d1e;margin-bottom:12px;display:flex;align-items:center;gap:8px">マイレシピ<span style="flex:1;height:1px;background:#f5e6c8;display:block"></span></div>
      <div id="myGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px"><div style="grid-column:span 2;text-align:center;padding:40px 20px;color:#9b7b5a"><div style="font-size:48px;margin-bottom:12px">⏳</div><div>読み込み中...</div></div></div>
    </div>
    <div id="tabPublicContent" style="display:none">
      <div style="font-family:Noto Serif JP,serif;font-size:15px;color:#5c3d1e;margin-bottom:12px;display:flex;align-items:center;gap:8px">レシピ広場<span style="flex:1;height:1px;background:#f5e6c8;display:block"></span></div>
      <div id="publicGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px"><div style="grid-column:span 2;text-align:center;padding:40px 20px;color:#9b7b5a"><div style="font-size:48px;margin-bottom:12px">⏳</div><div>読み込み中...</div></div></div>
    </div>
  </div>
  <button id="fabBtn" style="position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:#c0622a;color:white;font-size:28px;border:none;box-shadow:0 4px 16px rgba(192,98,42,0.4);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:150">＋</button>
</div>

<script>
const SUPABASE_URL = 'https://bobditigjxeofsfofsrb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvYmRpdGlnanhlb2ZzZm9mc3JiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NDY0NDAsImV4cCI6MjA5NDMyMjQ0MH0.P_umtNBTpBfJ5Ke48AX9Qo4z_2NftYGZMxkJDS_7ijU';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let myRecipes = [];
let publicRecipes = [];
const emojis = ['🍲','🥟','🍳','🍜','🥩','🍛','🥗','🍱','🍝','🍤'];

// 認証
sb.auth.getSession().then(({data:{session}}) => {
  if (session) { currentUser = session.user; showApp(); }
});
sb.auth.onAuthStateChange((e, session) => {
  if (session) { currentUser = session.user; showApp(); }
  else { currentUser = null; document.getElementById('authScreen').style.display='flex'; document.getElementById('appScreen').style.display='none'; }
});

function showTab(tab) {
  document.getElementById('loginForm').style.display = tab==='login' ? 'block' : 'none';
  document.getElementById('signupForm').style.display = tab==='signup' ? 'block' : 'none';
  document.getElementById('tabLogin').style.cssText = tab==='login' ? 'flex:1;padding:10px;text-align:center;font-size:13px;cursor:pointer;border-bottom:2px solid #c0622a;margin-bottom:-2px;color:#c0622a;font-weight:500' : 'flex:1;padding:10px;text-align:center;font-size:13px;cursor:pointer;color:#9b7b5a';
  document.getElementById('tabSignup').style.cssText = tab==='signup' ? 'flex:1;padding:10px;text-align:center;font-size:13px;cursor:pointer;border-bottom:2px solid #c0622a;margin-bottom:-2px;color:#c0622a;font-weight:500' : 'flex:1;padding:10px;text-align:center;font-size:13px;cursor:pointer;color:#9b7b5a';
}

document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const {error} = await sb.auth.signInWithPassword({email, password});
  if (error) document.getElementById('authMsg').innerHTML = '<span style="color:#e53e3e">ログインに失敗しました</span>';
});

document.getElementById('signupBtn').addEventListener('click', async () => {
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;
  const {error} = await sb.auth.signUp({email, password});
  if (error) document.getElementById('authMsg').innerHTML = '<span style="color:#e53e3e">登録に失敗しました</span>';
  else { document.getElementById('authMsg').innerHTML = '<span style="color:#4a7c59">✅ 登録完了！ログインしてください</span>'; showTab('login'); }
});

document.getElementById('logoutBtn').addEventListener('click', () => sb.auth.signOut());
document.getElementById('importBtn').addEventListener('click', () => alert('インポート機能は準備中です'));
document.getElementById('fabBtn').addEventListener('click', () => alert('新規レシピ登録は準備中です'));

function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  loadMyRecipes();
  loadPublicRecipes();
}

async function loadMyRecipes() {
  const {data} = await sb.from('recipes').select('*').eq('user_id', currentUser.id).order('created_at', {ascending:false});
  myRecipes = data || [];
  renderMyRecipes(myRecipes);
}

async function loadPublicRecipes() {
  const {data} = await sb.from('recipes').select('*').in('visibility', ['public','teaser']).order('created_at', {ascending:false});
  publicRecipes = data || [];
  renderPublicRecipes(publicRecipes);
}

function visLabel(v) { return v==='public'?'公開':v==='teaser'?'一部公開':'非公開'; }

function recipeCard(r, i) {
  const img = r.photo_url ? `<img src="${r.photo_url}" style="width:100%;height:100%;object-fit:cover">` : emojis[i % emojis.length];
  return `<div onclick="openRecipe('${r.id}')" style="background:#fffdf8;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(92,61,30,0.12);cursor:pointer">
    <div style="width:100%;height:110px;background:#f5e6c8;display:flex;align-items:center;justify-content:center;font-size:40px;overflow:hidden">${img}</div>
    <div style="padding:10px">
      <div style="font-family:Noto Serif JP,serif;font-size:13px;font-weight:700;margin-bottom:4px;line-height:1.4">${r.title}</div>
      <div style="font-size:11px;color:#9b7b5a;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="font-size:10px;padding:2px 6px;border-radius:10px;background:#f5e6c8;color:#9b7b5a">${visLabel(r.visibility)}</span>
        <span>${r.servings}人前</span>
      </div>
    </div>
  </div>`;
}

function renderMyRecipes(recipes) {
  const grid = document.getElementById('myGrid');
  if (!recipes.length) { grid.innerHTML = '<div style="grid-column:span 2;text-align:center;padding:40px 20px;color:#9b7b5a"><div style="font-size:48px;margin-bottom:12px">📖</div><div>まだレシピがありません<br>＋ボタンで追加しましょう</div></div>'; return; }
  grid.innerHTML = recipes.map((r,i) => recipeCard(r,i)).join('');
}

function renderPublicRecipes(recipes) {
  const grid = document.getElementById('publicGrid');
  if (!recipes.length) { grid.innerHTML = '<div style="grid-column:span 2;text-align:center;padding:40px 20px;color:#9b7b5a"><div style="font-size:48px;margin-bottom:12px">🌐</div><div>公開レシピがまだありません</div></div>'; return; }
  grid.innerHTML = recipes.map((r,i) => recipeCard(r,i)).join('');
}

function filterRecipes() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderMyRecipes(myRecipes.filter(r => r.title.toLowerCase().includes(q)));
}

function switchTab(tab) {
  document.getElementById('tabMyContent').style.display = tab==='my' ? 'block' : 'none';
  document.getElementById('tabPublicContent').style.display = tab==='public' ? 'block' : 'none';
  document.getElementById('tabMy').style.cssText = tab==='my' ? 'flex:1;padding:12px 8px;text-align:center;font-size:12px;cursor:pointer;border-bottom:2px solid #c0622a;margin-bottom:-2px;color:#c0622a;font-weight:500' : 'flex:1;padding:12px 8px;text-align:center;font-size:12px;cursor:pointer;color:#9b7b5a';
  document.getElementById('tabPublic').style.cssText = tab==='public' ? 'flex:1;padding:12px 8px;text-align:center;font-size:12px;cursor:pointer;border-bottom:2px solid #c0622a;margin-bottom:-2px;color:#c0622a;font-weight:500' : 'flex:1;padding:12px 8px;text-align:center;font-size:12px;cursor:pointer;color:#9b7b5a';
}

async function openRecipe(id) {
  alert('レシピ詳細は次のバージョンで実装します！');
}
</script>
</body>
</html>
