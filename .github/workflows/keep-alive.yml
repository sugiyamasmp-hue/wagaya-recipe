name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 9 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping WAGAYA
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL_WAGAYA }}/auth/v1/health")
          echo "WAGAYA Response: $RESPONSE"
          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 500 ]; then
            echo "✅ WAGAYA is alive!"
          else
            echo "❌ WAGAYA ping failed with HTTP $RESPONSE"
            exit 1
          fi
